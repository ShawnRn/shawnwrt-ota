name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck cmake build-essential
      - name: Build usign
        run: |
          set -euo pipefail
          git clone --depth 1 https://git.openwrt.org/project/usign.git /tmp/usign
          cmake -S /tmp/usign -B /tmp/usign/build
          cmake --build /tmp/usign/build
          sudo install -m 0755 /tmp/usign/build/usign /usr/local/bin/usign
      - name: Check shell script
        run: shellcheck src/usr/bin/shawnwrt-ota
      - name: Build opkg feed
        env:
          SHAWNWRT_OTA_USIGN_SECRET_KEY: ${{ secrets.SHAWNWRT_OTA_USIGN_SECRET_KEY }}
        run: scripts/build-opkg-feed.sh
      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: shawnwrt-ota-opkg-feed
          path: dist/*
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
